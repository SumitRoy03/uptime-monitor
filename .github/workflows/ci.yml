name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/uptime-api:latest ./api
          docker push ${{ secrets.DOCKER_USERNAME }}/uptime-api:latest

  build-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Worker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/uptime-worker:latest ./worker
          docker push ${{ secrets.DOCKER_USERNAME }}/uptime-worker:latest